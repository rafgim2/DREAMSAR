<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>DREAM AR XR</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; }
    #ui {
      position: fixed; inset: 0; display: grid; place-items: center;
      pointer-events: none;
    }
    #panel {
      pointer-events: auto;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 16px 18px;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      width: min(560px, calc(100vw - 40px));
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    #panel h2 { margin:0 0 10px; font-size: 16px; }
    #panel p { margin:0 0 12px; opacity:.85; line-height: 1.35; font-size: 13px; }
    #startBtn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(40,40,40,.9);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }
    #startBtn:hover { background: rgba(55,55,55,.95); }
    #hint { margin-top:10px; font-size:12px; opacity:.75; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="panel">
      <h2>DREAM AR</h2>
      <p>Pulsa para cargar vídeo + MIDI y entrar en AR. En Quest verás passthrough. Asegúrate de tener audio permitido.</p>
      <button id="startBtn">Cargar vídeo y entrar en AR</button>
      <div id="hint">Si no oyes audio, sube el volumen del visor y vuelve a pulsar el botón.</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';
    import { CUES } from './cues.js';

    // MIDI parser (Tonejs/Midi)
    import { Midi } from 'https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/dist/Midi.js';

    // =========================
    // AJUSTES (los tuyos)
    // =========================
    const VIDEO_URL = 'https://pub-aa6ee859836d478ca4ac85eb9f71f0c3.r2.dev/dreamurl3.mp4';

    const RIGHT_HAND_MIDI_URL = './dream14.mid';
    const LEFT_HAND_MIDI_URL  = './dream14iz.mid';

    const RIGHT_HAND_OFFSET = 14.5;   // mano derecha
    const LEFT_HAND_OFFSET  = 7.5;    // 14.5 - 7s (mano izquierda empieza antes)

    const HAPTIC_INTENSITY_RIGHT = 0.35;
    const HAPTIC_INTENSITY_LEFT  = 0.35;

    // Duración del pulso (ms)
    const HAPTIC_DURATION_MS_RIGHT = 35;
    const HAPTIC_DURATION_MS_LEFT  = 35;

    // Distancia/posición del “cine”
    const VIDEO_DISTANCE = 1.15;   // más cerca
    const VIDEO_HEIGHT   = 1.45;
    const VIDEO_WIDTH_M  = 1.15;   // ancho del plano del vídeo en metros
    const VIDEO_ASPECT   = 16/9;

    // Texto
    const TEXT_DISTANCE = 0.95;    // más cerca que el vídeo
    const TEXT_HEIGHT   = 1.65;    // tú ya lo ajustaste a 1.65
    const TEXT_PLANE_W  = 1.05;    // ancho en metros
    const TEXT_PLANE_H  = 0.50;    // alto en metros

    // Efecto “escritura a mano”
    const TYPE_SPEED_CHARS_PER_SEC = 22; // más bajo = más lento (ej: 14) / más alto = más rápido (ej: 30)

    // Oscurecer un poco el entorno (panel semitransparente detrás del vídeo)
    const DIM_ALPHA = 0.22; // 0 = nada, 0.35 = bastante

    // =========================
    // Setup Three.js / WebXR
    // =========================
    let scene, camera, renderer;
    let video, videoTexture, videoMesh;
    let dimMesh;
    let textMesh, textCanvas, textCtx, textTexture;
    let anchorGroup;  // grupo anclado “en el mundo” (no sigue la cabeza)
    let started = false;

    // Controladores (para háptica)
    let controller0, controller1;
    let rightGamepad = null;
    let leftGamepad  = null;

    // MIDI notes
    let rightNotes = [];
    let leftNotes = [];

    // Cues/text
    let currentCueIndex = -1;
    let cueStartTime = 0;
    let currentFullText = '';
    let currentShownChars = 0;

    const ui = document.getElementById('ui');
    const startBtn = document.getElementById('startBtn');

    init();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local-floor');
      document.body.appendChild(renderer.domElement);

      // Luz suave (no ilumina passthrough, pero ayuda en objetos)
      const ambient = new THREE.AmbientLight(0xffffff, 1.0);
      scene.add(ambient);

      // Grupo anclado al mundo
      anchorGroup = new THREE.Group();
      scene.add(anchorGroup);

      // Video element
      video = document.createElement('video');
      video.crossOrigin = 'anonymous';
      video.playsInline = true;
      video.loop = true;
      video.preload = 'auto';
      video.src = VIDEO_URL;

      videoTexture = new THREE.VideoTexture(video);
      videoTexture.colorSpace = THREE.SRGBColorSpace;

      // Plano del vídeo
      const videoH = VIDEO_WIDTH_M / VIDEO_ASPECT;
      const videoGeo = new THREE.PlaneGeometry(VIDEO_WIDTH_M, videoH);
      const videoMat = new THREE.MeshBasicMaterial({ map: videoTexture, transparent: true });
      videoMesh = new THREE.Mesh(videoGeo, videoMat);
      anchorGroup.add(videoMesh);

      // Panel para oscurecer un pelín detrás del vídeo
      const dimGeo = new THREE.PlaneGeometry(VIDEO_WIDTH_M * 1.12, videoH * 1.22);
      const dimMat = new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: DIM_ALPHA,
        depthWrite: false
      });
      dimMesh = new THREE.Mesh(dimGeo, dimMat);
      anchorGroup.add(dimMesh);

      // Texto como canvas texture
      setupTextCanvas();
      const textGeo = new THREE.PlaneGeometry(TEXT_PLANE_W, TEXT_PLANE_H);
      const textMat = new THREE.MeshBasicMaterial({ map: textTexture, transparent: true });
      textMesh = new THREE.Mesh(textGeo, textMat);
      anchorGroup.add(textMesh);

      // Controllers
      controller0 = renderer.xr.getController(0);
      controller1 = renderer.xr.getController(1);
      scene.add(controller0);
      scene.add(controller1);

      // Botón AR
      const button = ARButton.createButton(renderer, {
        requiredFeatures: ['local-floor'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });
      // Ocultamos el botón de ARButton porque usamos nuestro UI
      button.style.display = 'none';
      document.body.appendChild(button);

      // Start
      startBtn.addEventListener('click', startFlow);

      window.addEventListener('resize', onResize);
      renderer.setAnimationLoop(render);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    async function startFlow() {
      if (started) return;
      started = true;

      startBtn.disabled = true;
      startBtn.textContent = 'Cargando...';

      // 1) Cargar fuente PRISTINA.TTF para el canvas
      await loadPristinaFont();

      // 2) Cargar MIDI (dos archivos)
      try {
        const [r, l] = await Promise.all([
          fetchAndParseMidi(RIGHT_HAND_MIDI_URL),
          fetchAndParseMidi(LEFT_HAND_MIDI_URL),
        ]);
        rightNotes = r;
        leftNotes  = l;
      } catch (e) {
        console.error('Error cargando MIDI:', e);
      }

      // 3) Pedir entrar en AR (passthrough)
      try {
        await renderer.xr.setSession(await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body }
        }));
      } catch (e) {
        console.error('No se pudo iniciar AR:', e);
        startBtn.disabled = false;
        startBtn.textContent = 'Reintentar entrar en AR';
        return;
      }

      // 4) Arrancar vídeo (audio permitido porque viene de gesto del usuario)
      try {
        video.muted = false;
        video.volume = 1.0;
        await video.play();
      } catch (e) {
        console.warn('No se pudo reproducir con audio a la primera. Intentando muted->unmute...', e);
        // Fallback: arrancar muted y luego intentar desmutear
        try {
          video.muted = true;
          await video.play();
          video.muted = false;
        } catch (e2) {
          console.error('Vídeo no pudo iniciar:', e2);
        }
      }

      // 5) Anclar paneles en frente del usuario (una sola vez)
      placeAnchorInFront();

      // 6) Cachear gamepads (en XR los gamepads aparecen tras iniciar sesión)
      refreshGamepads();

      // 7) Programar háptica
      scheduleHandHaptics(rightNotes, 'right', RIGHT_HAND_OFFSET, HAPTIC_INTENSITY_RIGHT, HAPTIC_DURATION_MS_RIGHT);
      scheduleHandHaptics(leftNotes,  'left',  LEFT_HAND_OFFSET,  HAPTIC_INTENSITY_LEFT,  HAPTIC_DURATION_MS_LEFT);

      // 8) Iniciar texto
      currentCueIndex = -1;
      currentFullText = '';
      currentShownChars = 0;
      cueStartTime = performance.now();

      ui.style.display = 'none';
    }

    function refreshGamepads() {
      // En Quest: gamepads vienen como inputsources con handedness
      const session = renderer.xr.getSession();
      if (!session) return;

      rightGamepad = null;
      leftGamepad = null;

      for (const src of session.inputSources) {
        if (!src.gamepad) continue;
        if (src.handedness === 'right') rightGamepad = src.gamepad;
        if (src.handedness === 'left')  leftGamepad  = src.gamepad;
      }
    }

    function placeAnchorInFront() {
      // Colocamos el grupo a una posición fija en el mundo usando la pose actual del viewer
      const xrCamera = renderer.xr.getCamera(camera);

      const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(xrCamera.quaternion).normalize();
      const pos = new THREE.Vector3().copy(xrCamera.position);

      // VIDEO
      const videoPos = pos.clone()
        .add(dir.clone().multiplyScalar(VIDEO_DISTANCE));
      videoPos.y = VIDEO_HEIGHT;

      // TEXT
      const textPos = pos.clone()
        .add(dir.clone().multiplyScalar(TEXT_DISTANCE));
      textPos.y = TEXT_HEIGHT;

      // Orientación común (mirando al usuario)
      const lookTarget = pos.clone();
      lookTarget.y = VIDEO_HEIGHT;

      // Situamos todo el anchorGroup en el espacio del vídeo (y luego ajustamos offsets internos)
      anchorGroup.position.copy(videoPos);
      anchorGroup.lookAt(lookTarget);

      // Colocar el dim detrás del vídeo y el vídeo delante
      const videoH = VIDEO_WIDTH_M / VIDEO_ASPECT;

      // En el grupo: ponemos vídeo en (0,0,0)
      videoMesh.position.set(0, 0, 0);
      dimMesh.position.set(0, 0, -0.01);

      // Texto: colócalo un poco por encima y algo más cerca
      // Como anchorGroup está en posición de vídeo, convertimos el desplazamiento del texto relativo
      const rel = textPos.clone().sub(videoPos);
      textMesh.position.copy(rel);

      // Ajuste leve hacia el usuario para que quede delante (en el eje local Z negativo)
      // Mantiene el texto un pelín “encima” del vídeo y separado
      textMesh.position.z -= 0.03;
    }

    async function loadPristinaFont() {
      try {
        const font = new FontFace('PristinaLocal', 'url(./PRISTINA.TTF)');
        await font.load();
        document.fonts.add(font);
      } catch (e) {
        console.warn('No se pudo cargar PRISTINA.TTF. Se usará fallback.', e);
      }
    }

    function setupTextCanvas() {
      textCanvas = document.createElement('canvas');
      textCanvas.width = 2048;
      textCanvas.height = 1024;
      textCtx = textCanvas.getContext('2d');

      textTexture = new THREE.CanvasTexture(textCanvas);
      textTexture.colorSpace = THREE.SRGBColorSpace;

      drawTextCanvas('', 0);
    }

    function drawTextCanvas(fullText, shownChars) {
      const w = textCanvas.width;
      const h = textCanvas.height;

      // Limpia (transparente)
      textCtx.clearRect(0, 0, w, h);

      // Fondo transparente + ligera “niebla” para legibilidad
      // (si quieres, puedes comentar esto)
      textCtx.fillStyle = 'rgba(0,0,0,0.10)';
      roundRect(textCtx, 40, 40, w - 80, h - 80, 48);
      textCtx.fill();

      // Texto
      const textToShow = fullText.slice(0, shownChars);

      // Fuente PRISTINA (si cargó), si no, fallback
      textCtx.fillStyle = 'rgba(255,255,255,0.95)';
      textCtx.textAlign = 'left';
      textCtx.textBaseline = 'top';

      const fontStack = 'PristinaLocal, "Pristina", "Brush Script MT", "Segoe Script", cursive';
      const fontSize = 84;
      textCtx.font = `${fontSize}px ${fontStack}`;

      // IMPORTANTE: para que NO “recoloque”, fijamos un layout estable:
      // - misma caja
      // - mismo wrap
      // - mismas posiciones
      const paddingX = 110;
      const paddingY = 110;
      const maxWidth = w - paddingX * 2;

      // Dibujamos línea a línea con wrap determinista
      const lines = wrapTextDeterministic(textToShow, maxWidth, textCtx);
      let y = paddingY;

      for (const line of lines) {
        textCtx.fillText(line, paddingX, y);
        y += 98; // interlineado fijo
        if (y > h - 160) break;
      }

      textTexture.needsUpdate = true;
    }

    function wrapTextDeterministic(text, maxWidth, ctx) {
      // Wrap determinista por palabras, sin reflow raro
      const words = text.replace(/\n/g, ' \n ').split(/\s+/);
      const out = [];
      let line = '';

      for (const w of words) {
        if (w === '\n') {
          out.push(line.trimEnd());
          line = '';
          continue;
        }

        const test = line ? (line + ' ' + w) : w;
        if (ctx.measureText(test).width > maxWidth && line) {
          out.push(line);
          line = w;
        } else {
          line = test;
        }
      }
      if (line) out.push(line);
      return out;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    async function fetchAndParseMidi(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`No se pudo cargar MIDI: ${url}`);
      const arrayBuffer = await res.arrayBuffer();
      const midi = new Midi(arrayBuffer);

      // Sacamos notas de todas las pistas (puedes limitar si quieres)
      const notes = [];
      for (const track of midi.tracks) {
        for (const n of track.notes) {
          notes.push({ time: n.time, velocity: n.velocity });
        }
      }

      // Orden por tiempo
      notes.sort((a, b) => a.time - b.time);
      return notes;
    }

    function scheduleHandHaptics(notes, hand, offsetSec, intensity, durationMs) {
      if (!notes || notes.length === 0) return;

      const base = performance.now();

      for (const n of notes) {
        const whenMs = (n.time + offsetSec) * 1000;
        if (whenMs < 0) continue;

        setTimeout(() => {
          // refresca gamepads por si tardan en aparecer
          refreshGamepads();

          const gp = (hand === 'right') ? rightGamepad : leftGamepad;
          if (!gp || !gp.hapticActuators || !gp.hapticActuators[0]) return;

          // Opcional: mapear velocity a intensidad (muy suave)
          // const vel = Math.max(0, Math.min(1, n.velocity ?? 0.7));
          // const amp = Math.max(0.12, Math.min(0.55, intensity * (0.6 + 0.8 * vel)));

          const amp = intensity;

          try {
            gp.hapticActuators[0].pulse(amp, durationMs);
          } catch (e) {
            // En algunos navegadores puede fallar puntualmente
          }
        }, Math.max(0, whenMs - (performance.now() - base)));
      }
    }

    function updateCues() {
      if (!video || video.readyState < 2) return;

      const t = video.currentTime;

      // Selecciona cue actual
      let idx = -1;
      for (let i = 0; i < CUES.length; i++) {
        if (t >= CUES[i].time) idx = i;
        else break;
      }

      if (idx !== currentCueIndex) {
        currentCueIndex = idx;

        if (idx >= 0) {
          const cue = CUES[idx];
          currentFullText = cue.lines.join('\n');
          currentShownChars = 0;
          cueStartTime = performance.now();
          drawTextCanvas(currentFullText, currentShownChars);
        } else {
          currentFullText = '';
          currentShownChars = 0;
          drawTextCanvas('', 0);
        }
      }

      // Typewriter
      if (currentCueIndex >= 0 && currentFullText) {
        const elapsed = (performance.now() - cueStartTime) / 1000;
        const targetChars = Math.floor(elapsed * TYPE_SPEED_CHARS_PER_SEC);
        const clamped = Math.min(currentFullText.length, targetChars);

        if (clamped !== currentShownChars) {
          currentShownChars = clamped;
          drawTextCanvas(currentFullText, currentShownChars);
        }
      }
    }

    function render() {
      if (!started) {
        renderer.render(scene, camera);
        return;
      }

      // Cues en tiempo real
      updateCues();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
