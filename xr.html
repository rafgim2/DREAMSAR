<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DREAM AR</title>
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#000; font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #ui {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #btn {
      pointer-events: auto;
      padding: 16px 22px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(20,20,20,0.75);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    #hint {
      position: fixed;
      left: 0; right: 0; bottom: 14px;
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="ui">
    <button id="btn">Entrar en AR</button>
  </div>
  <div id="hint">Si no aparece passthrough, revisa permisos de cámara y que el navegador sea el de Quest.</div>

  <script type="module">
    // =========================
    // CONFIG
    // =========================
    // Pega aquí tu vídeo (R2 público / CDN). Debe permitir CORS.
    const VIDEO_URL = "https://pub-aa6ee859836d478ca4ac85eb9f71f0c3.r2.dev/dreamurl3.mp4";

    // MIDI en la raíz del repo
    const MIDI_RIGHT_URL = "./dream14.mid";
    const MIDI_LEFT_URL  = "./dream14iz.mid";

    // Offsets independientes
    const RIGHT_HAND_OFFSET = 14.5; // mano derecha
    const LEFT_HAND_OFFSET  = 7.5;  // 14.5 - 7 = 7.5 (mano izquierda empieza 7s antes)

    // Háptica
    const HAPTIC_INTENSITY_RIGHT = 0.35;
    const HAPTIC_INTENSITY_LEFT  = 0.35;
    const HAPTIC_DURATION_MS = 35; // sutil

    // Colocación (en metros) — tú ya querías letras a 1.65
    const PANEL_DISTANCE = 0.95;  // más cerca
    const PANEL_Y = 1.35;
    const TEXT_Y  = 1.65;

    // Texto: usa cues.js (en la raíz)
    // Formato esperado: export const CUES = [{ t: 0, text: "..." }, ...]
    // t en segundos RELATIVO al inicio del vídeo (sin contar offsets MIDI).
    import { CUES } from "./cues.js";

    // =========================
    // Imports (Three + WebXR + MIDI)
    // =========================
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js";
    import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js";
    import { FontLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/FontLoader.js";
    import { TextGeometry } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/geometries/TextGeometry.js";

    // MIDI parser (Tonejs Midi como módulo)
    import { Midi } from "https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/dist/Midi.js";

    // =========================
    // THREE setup
    // =========================
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera();

    // Luz suave para texto (aunque sea AR)
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(1, 2, 1);
    scene.add(light);

    // =========================
    // VIDEO
    // =========================
    const video = document.createElement("video");
    video.crossOrigin = "anonymous";
    video.playsInline = true;
    video.preload = "auto";
    video.loop = true;
    video.muted = false;        // queremos audio
    video.src = VIDEO_URL;

    const videoTex = new THREE.VideoTexture(video);
    videoTex.colorSpace = THREE.SRGBColorSpace;

    // Plano de vídeo
    const videoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true });
    const videoGeo = new THREE.PlaneGeometry(1.35, 0.76); // 16:9 aprox
    const videoMesh = new THREE.Mesh(videoGeo, videoMat);
    scene.add(videoMesh);

    // =========================
    // TEXTO (canvas texture para efecto "mano" sin recolocar)
    // =========================
    const textCanvas = document.createElement("canvas");
    textCanvas.width = 2048;
    textCanvas.height = 1024;
    const ctx = textCanvas.getContext("2d", { alpha: true });

    const textTex = new THREE.CanvasTexture(textCanvas);
    textTex.colorSpace = THREE.SRGBColorSpace;

    const textMat = new THREE.MeshBasicMaterial({ map: textTex, transparent: true });
    const textGeo = new THREE.PlaneGeometry(1.6, 0.8);
    const textMesh = new THREE.Mesh(textGeo, textMat);
    scene.add(textMesh);

    // Pre-cálculo de layout (para que NO “salte” al escribir)
    let currentCueIndex = -1;
    let currentFullText = "";
    let lines = [];
    let totalChars = 0;
    let revealedChars = 0;
    let typingActive = false;

    // Carga de la fuente TTF (para canvas)
    const fontFace = new FontFace("Pristina", "url(./PRISTINA.TTF)");
    await fontFace.load();
    document.fonts.add(fontFace);

    function wrapTextToLines(text, maxWidthPx, font) {
      ctx.font = font;
      const words = text.replace(/\r/g, "").split(/\s+/);
      const out = [];
      let line = "";

      for (const w of words) {
        const test = line ? (line + " " + w) : w;
        if (ctx.measureText(test).width <= maxWidthPx) {
          line = test;
        } else {
          if (line) out.push(line);
          line = w;
        }
      }
      if (line) out.push(line);
      return out;
    }

    function setCueText(fullText) {
      currentFullText = fullText;
      const font = "62px Pristina";
      // layout fijo
      lines = wrapTextToLines(fullText, 1750, font);
      totalChars = lines.reduce((acc, l) => acc + l.length, 0) + Math.max(0, lines.length - 1); // + saltos
      revealedChars = 0;
      typingActive = true;
      drawTextCanvas(0);
    }

    function drawTextCanvas(charsToShow) {
      ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);

      // Estilo
      ctx.font = "62px Pristina";
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.textBaseline = "top";
      ctx.shadowColor = "rgba(0,0,0,0.55)";
      ctx.shadowBlur = 10;

      // Fondo sutil para legibilidad (no oscurece el passthrough global)
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      roundRect(ctx, 40, 40, textCanvas.width - 80, textCanvas.height - 80, 36, true, false);

      // Texto “revelado” sin recalcular layout
      ctx.fillStyle = "rgba(255,255,255,0.95)";

      let remaining = charsToShow;
      let x = 110;
      let y = 120;
      const lineH = 86;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // ¿cuántos chars de esta línea puedo mostrar?
        const take = Math.min(remaining, line.length);
        const shown = line.slice(0, take);

        ctx.fillText(shown, x, y);

        remaining -= take;

        // consumimos 1 “char virtual” por salto de línea para que el avance sea uniforme
        if (remaining > 0) remaining -= 1;

        y += lineH;
        if (remaining <= 0) break;
      }

      textTex.needsUpdate = true;
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
      if (typeof r === "number") r = {tl:r,tr:r,br:r,bl:r};
      ctx.beginPath();
      ctx.moveTo(x + r.tl, y);
      ctx.lineTo(x + w - r.tr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
      ctx.lineTo(x + w, y + h - r.br);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
      ctx.lineTo(x + r.bl, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
      ctx.lineTo(x, y + r.tl);
      ctx.quadraticCurveTo(x, y, x + r.tl, y);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    // Velocidad escritura: más lento = menor chars por segundo
    const TYPE_CHARS_PER_SEC = 32; // cámbialo (ej: 20 más lento, 45 más rápido)

    // =========================
    // MIDI -> HAPTICS (scheduler robusto basado en video.currentTime)
    // =========================
    async function loadMidiNotes(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error("No se pudo cargar MIDI: " + url);
      const buf = await res.arrayBuffer();
      const midi = new Midi(buf);

      // Flatten de notas (todas las pistas) por tiempo
      const notes = [];
      for (const tr of midi.tracks) {
        for (const n of tr.notes) notes.push({ time: n.time, velocity: n.velocity });
      }
      notes.sort((a,b) => a.time - b.time);
      return notes;
    }

    const rightNotes = await loadMidiNotes(MIDI_RIGHT_URL);
    const leftNotes  = await loadMidiNotes(MIDI_LEFT_URL);

    // Índices de disparo por mano
    let rightIdx = 0;
    let leftIdx  = 0;

    // Gamepads XR (se asignan al entrar en sesión)
    let rightPad = null;
    let leftPad  = null;

    function getActuator(gamepad) {
      if (!gamepad) return null;
      const a = gamepad.hapticActuators && gamepad.hapticActuators[0];
      return a || null;
    }

    function pulse(gamepad, intensity) {
      const a = getActuator(gamepad);
      if (!a || typeof a.pulse !== "function") return;
      a.pulse(intensity, HAPTIC_DURATION_MS).catch(()=>{});
    }

    // Scheduler: dispara eventos cuando (note.time + offset) <= videoTime
    // con lookahead para estabilidad
    const LOOKAHEAD = 0.10; // 100ms

    function runHapticsScheduler() {
      const t = video.currentTime;

      // Mano derecha
      while (rightIdx < rightNotes.length) {
        const eventT = rightNotes[rightIdx].time + RIGHT_HAND_OFFSET;
        if (eventT <= t + LOOKAHEAD) {
          pulse(rightPad, HAPTIC_INTENSITY_RIGHT);
          rightIdx++;
        } else break;
      }

      // Mano izquierda (7s antes)
      while (leftIdx < leftNotes.length) {
        const eventT = leftNotes[leftIdx].time + LEFT_HAND_OFFSET;
        if (eventT <= t + LOOKAHEAD) {
          pulse(leftPad, HAPTIC_INTENSITY_LEFT);
          leftIdx++;
        } else break;
      }
    }

    function resetHaptics() {
      rightIdx = 0;
      leftIdx = 0;
    }

    // =========================
    // CUES (texto por tiempo)
    // =========================
    function updateCuesAndTyping(dt) {
      if (!CUES || !CUES.length) return;

      const t = video.currentTime;

      // buscar cue actual (asumimos CUES ordenado por t)
      let idx = -1;
      for (let i = 0; i < CUES.length; i++) {
        if (t >= CUES[i].t) idx = i;
        else break;
      }

      if (idx !== currentCueIndex) {
        currentCueIndex = idx;
        if (idx >= 0) {
          setCueText(CUES[idx].text || "");
        } else {
          setCueText("");
        }
      }

      // escribir
      if (typingActive && totalChars > 0) {
        revealedChars += TYPE_CHARS_PER_SEC * dt;
        const show = Math.min(totalChars, Math.floor(revealedChars));
        drawTextCanvas(show);
        if (show >= totalChars) typingActive = false;
      }
    }

    // =========================
    // WebXR Session + Anchoring (no head-locked)
    // =========================
    let lastTs = 0;
    let anchored = false;

    function placeInFrontOnce() {
      // Colocamos una sola vez delante del usuario al entrar
      // sin seguir la cabeza (world-locked).
      const xrCam = renderer.xr.getCamera(camera);
      const dir = new THREE.Vector3();
      xrCam.getWorldDirection(dir);

      const pos = new THREE.Vector3();
      xrCam.getWorldPosition(pos);

      // Posición del panel (vídeo)
      const panelPos = pos.clone().add(dir.multiplyScalar(PANEL_DISTANCE));
      panelPos.y = PANEL_Y;

      videoMesh.position.copy(panelPos);
      videoMesh.lookAt(pos.x, panelPos.y, pos.z); // “mirando” al usuario pero fijo en mundo

      // Texto un poco por encima, más cerca también
      const dir2 = new THREE.Vector3();
      xrCam.getWorldDirection(dir2);

      const textPos = pos.clone().add(dir2.multiplyScalar(PANEL_DISTANCE));
      textPos.y = TEXT_Y;

      textMesh.position.copy(textPos);
      textMesh.lookAt(pos.x, textPos.y, pos.z);

      anchored = true;
    }

    renderer.setAnimationLoop((ts) => {
      const dt = lastTs ? (ts - lastTs) / 1000 : 0;
      lastTs = ts;

      if (!anchored && renderer.xr.isPresenting) {
        placeInFrontOnce();
      }

      if (video.readyState >= 2 && !video.paused) {
        runHapticsScheduler();
        updateCuesAndTyping(dt);
      }

      renderer.render(scene, camera);
    });

    // =========================
    // UI / Start AR
    // =========================
    const btn = document.getElementById("btn");

    btn.addEventListener("click", async () => {
      // Requisito de autoplay: play tras gesto del usuario
      try { await video.play(); } catch (e) {
        // si falla, probamos muted->play->unmute (algunos navegadores)
        video.muted = true;
        try { await video.play(); } catch(_) {}
        video.muted = false;
      }

      resetHaptics();
      anchored = false;

      // ARButton (passthrough)
      const arBtn = ARButton.createButton(renderer, {
        requiredFeatures: ["local-floor"],
        optionalFeatures: ["dom-overlay", "dom-overlay-for-handheld-ar"],
        domOverlay: { root: document.body }
      });

      // Dispara el click del ARButton “interno” automáticamente
      document.body.appendChild(arBtn);
      arBtn.click();
      arBtn.remove();

      document.getElementById("ui").style.display = "none";
    });

    // Captura mandos (handedness)
    renderer.xr.addEventListener("sessionstart", () => {
      const session = renderer.xr.getSession();
      if (!session) return;

      // reset haptics cada vez
      resetHaptics();
      anchored = false;

      function updateInputs() {
        rightPad = null;
        leftPad = null;

        for (const src of session.inputSources) {
          if (!src || !src.gamepad) continue;
          if (src.handedness === "right") rightPad = src.gamepad;
          if (src.handedness === "left")  leftPad = src.gamepad;
        }
      }

      updateInputs();
      session.addEventListener("inputsourceschange", updateInputs);
    });

    // Responsive
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
