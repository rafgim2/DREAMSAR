<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XR AR Video + MIDI + Marco + Partículas desde mandos</title>

<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,Arial}
  #overlay{
    position:fixed;inset:0;display:grid;place-items:center;
    background:rgba(0,0,0,.85);color:#fff;z-index:10;text-align:center;padding:24px;
  }
  .card{
    background:rgba(255,255,255,.08);
    padding:20px;border-radius:18px;
    max-width:820px;width:100%;
  }
  button{
    padding:14px 18px;border-radius:14px;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.12);
    color:#fff;cursor:pointer;margin:6px;
  }
  .small{opacity:.75;font-size:14px;margin-top:10px;text-align:left;white-space:pre-wrap}
</style>
</head>

<body>
<div id="overlay">
  <div class="card">
    <h2 style="margin:0 0 10px 0;">Experiencia AR</h2>
    <p style="margin:0 0 14px 0;opacity:.9;">Vídeo + texto + háptica + marco gradiente + partículas desde mandos</p>

    <button id="start">▶ Iniciar vídeo</button>
    <button id="enterAR" disabled>Entrar en AR</button>
    <button id="enterVR" disabled>Entrar en VR</button>

    <div class="small" id="log"></div>
  </div>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { VIDEO_URL, CUES } from "./cues.js";

const overlay = document.getElementById("overlay");
const logEl = document.getElementById("log");
const log = (m) => { logEl.textContent += (logEl.textContent ? "\n" : "") + m; };

// ==================== CONFIG MIDI/HÁPTICA ====================
const MIDI_RIGHT_URL = "./dream14.mid";
const MIDI_LEFT_URL  = "./dream14iz.mid";

const MIDI_OFFSET_RIGHT = 14.5;
const MIDI_OFFSET_LEFT  = 8.5;

const HAPTIC_INTENSITY = 0.35;
const HAPTIC_DURATION_MS = 18;
const HAPTIC_WINDOW = 0.020;
const MIN_PULSE_GAP = 0.010;

// ==================== FUENTE PRISTINA (no bloqueante) ====================
let FONT_READY = false;
function loadPristinaFontNonBlocking(){
  try{
    const f = new FontFace("PristinaAR","url(./PRISTINA.TTF)");
    f.load().then(() => {
      document.fonts.add(f);
      FONT_READY = true;
      log("✅ Fuente PRISTINA cargada");
    }).catch(() => log("⚠️ PRISTINA.TTF no cargó (fallback)"));
  }catch{ log("⚠️ FontFace no disponible (fallback)"); }
}
const fontName = () => FONT_READY ? "PristinaAR" : "serif";

// ==================== THREE / XR ====================
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 50);
camera.position.set(0, 1.6, 2);

scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 1.2));

// ==================== VIDEO + AUDIO ====================
const video = document.createElement("video");
video.src = VIDEO_URL;
video.crossOrigin = "anonymous";
video.loop = true;
video.preload = "auto";
video.playsInline = true;
video.setAttribute("playsinline","");
video.setAttribute("webkit-playsinline","");
video.muted = false;
video.volume = 1.0;

video.style.position = "fixed";
video.style.left = "-9999px";
video.style.top = "-9999px";
video.width = 1; video.height = 1;
document.body.appendChild(video);

const videoTex = new THREE.VideoTexture(video);
videoTex.colorSpace = THREE.SRGBColorSpace;

const screenW = 1.6;
const screenH = 0.9;

const screen = new THREE.Mesh(
  new THREE.PlaneGeometry(screenW, screenH),
  new THREE.MeshBasicMaterial({ map: videoTex, transparent:true })
);
screen.position.set(0, 1.55, -1.35);
scene.add(screen);

// ==================== MARCO REDONDEADO GRADIENTE ====================
const frameGroup = new THREE.Group();
frameGroup.position.copy(screen.position);
frameGroup.rotation.copy(screen.rotation);
scene.add(frameGroup);

const margin = 0.010;
const border = 0.030;
const radius = 0.070;
const zFront = 0.003;

const gradCanvas = document.createElement("canvas");
gradCanvas.width = 512; gradCanvas.height = 512;
const gctx = gradCanvas.getContext("2d");
const gradTex = new THREE.CanvasTexture(gradCanvas);
gradTex.colorSpace = THREE.SRGBColorSpace;
gradTex.minFilter = THREE.LinearFilter;
gradTex.magFilter = THREE.LinearFilter;

function drawGradient(phase, energy){
  gctx.clearRect(0,0,512,512);
  const cx = 256, cy = 256;
  const angle = phase * 0.35 + energy * 0.25;
  const dx = Math.cos(angle) * 180;
  const dy = Math.sin(angle) * 180;

  const grd = gctx.createLinearGradient(cx - dx, cy - dy, cx + dx, cy + dy);
  const a = 0.92 + energy * 0.06;
  grd.addColorStop(0.00, `rgba(255, 214, 100, ${a})`);
  grd.addColorStop(0.50, `rgba(255, 140,  60, ${a})`);
  grd.addColorStop(1.00, `rgba(120,  55,  20, ${a})`);

  gctx.fillStyle = grd;
  gctx.fillRect(0,0,512,512);
  gradTex.needsUpdate = true;
}

function roundedRectShape(w,h,r){
  const x = -w/2, y = -h/2;
  const s = new THREE.Shape();
  s.moveTo(x+r, y);
  s.lineTo(x+w-r, y);
  s.quadraticCurveTo(x+w, y, x+w, y+r);
  s.lineTo(x+w, y+h-r);
  s.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  s.lineTo(x+r, y+h);
  s.quadraticCurveTo(x, y+h, x, y+h-r);
  s.lineTo(x, y+r);
  s.quadraticCurveTo(x, y, x+r, y);
  return s;
}

const outerW = screenW + margin*2;
const outerH = screenH + margin*2;
const innerW = outerW - border*2;
const innerH = outerH - border*2;

const outer = roundedRectShape(outerW, outerH, radius);
const hole  = roundedRectShape(innerW, innerH, Math.max(0.001, radius - border));
outer.holes.push(hole);

const frameGeo = new THREE.ShapeGeometry(outer);
const frameMat = new THREE.MeshBasicMaterial({ map: gradTex, transparent:true, opacity:0.85 });
const frameMesh = new THREE.Mesh(frameGeo, frameMat);
frameMesh.position.set(0,0,zFront);
frameGroup.add(frameMesh);

let frameEnergy = 0;
let framePhase = 0;

// ==================== TEXTO “ESCRITURA” ====================
const pad = 36, fontPx = 56, lineH = 78;
let canvas, ctx, texture, plane;
let fullLines = [], fullWidths = [], fullText = "";
let cursor = 0, nextT = 0;
let prevVideoT = 0;

const TEXT_Y = 1.65;
const TYPE_CPS_MIN = 8;
const TYPE_CPS_MAX = 14;

function setupText(lines){
  fullLines = Array.isArray(lines) ? lines : [String(lines)];

  const mctx = document.createElement("canvas").getContext("2d");
  mctx.font = `${fontPx}px ${fontName()}`;
  fullWidths = fullLines.map(l => mctx.measureText(l).width);

  const w = Math.ceil(Math.max(...fullWidths) + pad*2);
  const h = Math.ceil(fullLines.length * lineH + pad*2);

  canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  ctx = canvas.getContext("2d");

  texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  texture.generateMipmaps = false;

  if (plane){
    plane.material.dispose();
    plane.geometry.dispose();
    scene.remove(plane);
  }

  const aspect = w / h;
  const physicalH = 0.30;
  const physicalW = physicalH * aspect;

  plane = new THREE.Mesh(
    new THREE.PlaneGeometry(physicalW, physicalH),
    new THREE.MeshBasicMaterial({ map: texture, transparent:true, depthWrite:false })
  );
  plane.position.set(0, TEXT_Y, -1.05);
  scene.add(plane);

  fullText = fullLines.join("\n");
  cursor = 0;
  nextT = 0;
  draw(0);
}

function draw(chars){
  if (!ctx) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = `${fontPx}px ${fontName()}`;
  ctx.fillStyle = "rgba(255,255,255,0.96)";
  ctx.shadowColor = "rgba(0,0,0,0.85)";
  ctx.shadowBlur = 20;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const visible = fullText.slice(0, chars).split("\n");
  const cx = canvas.width / 2;
  let y = pad + lineH/2;

  for (let i=0;i<fullLines.length;i++){
    const full = fullLines[i];
    const vis  = visible[i] || "";
    const left = cx - fullWidths[i]/2;
    const vw   = ctx.measureText(vis).width;

    ctx.save();
    ctx.beginPath();
    ctx.rect(left, y - lineH/2, vw, lineH);
    ctx.clip();
    ctx.fillText(full, cx, y);
    ctx.restore();

    y += lineH;
  }
  texture.needsUpdate = true;
}

function randomCps(){ return TYPE_CPS_MIN + Math.random() * (TYPE_CPS_MAX - TYPE_CPS_MIN); }
function stepType(dt){
  if (!fullText || cursor >= fullText.length) return;
  nextT -= dt;
  while (nextT <= 0 && cursor < fullText.length){
    cursor++;
    draw(cursor);
    nextT += 1 / randomCps();
  }
}

// ==================== CUES ====================
const cues = [...CUES].sort((a,b)=>a.t-b.t);
let nextCue = 0;

// ==================== MIDI LIB + CARGA ====================
let MidiLib = null;
async function loadMidiLib(){
  if (MidiLib) return;
  log("⏳ Cargando librería MIDI…");
  MidiLib = await import("https://esm.sh/@tonejs/midi@2.0.28?bundle");
  log("✅ Librería MIDI lista");
}
async function loadMidiTimes(url){
  await loadMidiLib();
  const { Midi } = MidiLib;
  const res = await fetch(url);
  if (!res.ok) throw new Error("No se pudo cargar " + url);
  const ab = await res.arrayBuffer();
  const midi = new Midi(ab);
  const times = [];
  for (const track of midi.tracks){
    for (const n of track.notes) times.push(n.time);
  }
  times.sort((a,b)=>a-b);
  return times;
}

// ==================== CONTROLLERS (GRIP 0 y 1 FIJOS) ====================
let xrSession = null;

const grip0 = renderer.xr.getControllerGrip(0);
const grip1 = renderer.xr.getControllerGrip(1);
scene.add(grip0);
scene.add(grip1);

let controllerRightObj = null;
let controllerLeftObj  = null;

function mapGrips(session){
  controllerRightObj = null;
  controllerLeftObj  = null;

  const pointers = [];
  for (const src of session.inputSources){
    if (src.targetRayMode === "tracked-pointer") pointers.push(src);
  }

  for (let i=0;i<pointers.length;i++){
    const src = pointers[i];
    const obj = (i === 0) ? grip0 : grip1;
    if (src.handedness === "right") controllerRightObj = obj;
    if (src.handedness === "left")  controllerLeftObj  = obj;
  }

  log(controllerRightObj ? "🎮 Mando derecho mapeado" : "⚠️ No detecto mando derecho");
  log(controllerLeftObj  ? "🎮 Mando izquierdo mapeado" : "⚠️ No detecto mando izquierdo");
}

// ==================== PARTÍCULAS (Shader: alpha real, sin negro) ====================
const MAX_PARTICLES = 320;
const P_SPAWN = 3;

// ✅ más vida
const P_LIFE = 4.0;

// tamaño base (en pixels aprox; el shader lo ajusta con distancia)
const P_SIZE = 14.0;

// textura sprite (alpha suave)
function makeSpriteTexture(){
  const c = document.createElement("canvas");
  c.width = 64; c.height = 64;
  const cx = c.getContext("2d");
  const g = cx.createRadialGradient(32,32,0,32,32,30);
  g.addColorStop(0.0,"rgba(255,255,255,1)");
  g.addColorStop(0.5,"rgba(255,255,255,0.35)");
  g.addColorStop(1.0,"rgba(255,255,255,0)");
  cx.fillStyle = g;
  cx.fillRect(0,0,64,64);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}
const spriteTex = makeSpriteTexture();

// buffers
const positions  = new Float32Array(MAX_PARTICLES * 3);
const colors     = new Float32Array(MAX_PARTICLES * 3);
const alphas     = new Float32Array(MAX_PARTICLES);
const alive      = new Float32Array(MAX_PARTICLES);
const velocity   = new Float32Array(MAX_PARTICLES * 3);

const pGeom = new THREE.BufferGeometry();
pGeom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
pGeom.setAttribute("color",    new THREE.BufferAttribute(colors, 3));
pGeom.setAttribute("alpha",    new THREE.BufferAttribute(alphas, 1));

// init
for (let i=0;i<MAX_PARTICLES;i++){
  alive[i] = 0;
  positions[i*3+0] = 0;
  positions[i*3+1] = -999;
  positions[i*3+2] = 0;
  colors[i*3+0] = 1; colors[i*3+1] = 1; colors[i*3+2] = 1;
  alphas[i] = 0;
}

// ShaderMaterial para alpha por partícula
const pMat = new THREE.ShaderMaterial({
  uniforms: {
    uMap: { value: spriteTex },
    uSize: { value: P_SIZE }
  },
  vertexShader: `
    attribute float alpha;
    varying vec3 vColor;
    varying float vAlpha;

    uniform float uSize;

    void main(){
      vColor = color;
      vAlpha = alpha;

      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_Position = projectionMatrix * mv;

      // tamaño con atenuación por distancia (estable en Quest)
      float dist = max(0.6, -mv.z);
      gl_PointSize = uSize * (1.2 / dist) * 120.0;
      gl_PointSize = clamp(gl_PointSize, 2.0, 64.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D uMap;
    varying vec3 vColor;
    varying float vAlpha;

    void main(){
      vec4 tex = texture2D(uMap, gl_PointCoord);

      // alpha real (fade-out real), sin oscurecer passthrough
      float a = tex.a * vAlpha;

      // si está casi muerto, descartamos para que no quede "resto"
      if (a < 0.01) discard;

      // aditivo: color * alpha
      gl_FragColor = vec4(vColor * a, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  depthTest: false,
  blending: THREE.AdditiveBlending
});

const points = new THREE.Points(pGeom, pMat);
points.frustumCulled = false;
points.renderOrder = 999;
scene.add(points);

let pCursor = 0;
const tmpV = new THREE.Vector3();
const tmpFallback = new THREE.Vector3();

function spawnParticlesFrom(worldPos, warm){
  for (let k=0;k<P_SPAWN;k++){
    const i = pCursor;
    pCursor = (pCursor + 1) % MAX_PARTICLES;

    alive[i] = P_LIFE;

    positions[i*3+0] = worldPos.x + (Math.random()-0.5)*0.04;
    positions[i*3+1] = worldPos.y + (Math.random()-0.5)*0.04;
    positions[i*3+2] = worldPos.z + (Math.random()-0.5)*0.04;

    velocity[i*3+0] = (Math.random()-0.5)*0.06;
    velocity[i*3+1] = 0.12 + Math.random()*0.08;  // más lento = atmósfera
    velocity[i*3+2] = (Math.random()-0.5)*0.06;

    const b = 0.80 + warm*0.20;
    colors[i*3+0] = 1.0 * b;
    colors[i*3+1] = (0.60 + 0.30*Math.random()) * b;
    colors[i*3+2] = (0.14 + 0.12*Math.random()) * b;

    alphas[i] = 1.0;
  }

  pGeom.attributes.position.needsUpdate = true;
  pGeom.attributes.color.needsUpdate = true;
  pGeom.attributes.alpha.needsUpdate = true;
}

function updateParticles(dt){
  let any = false;

  for (let i=0;i<MAX_PARTICLES;i++){
    if (alive[i] <= 0) continue;
    any = true;

    alive[i] -= dt;
    const life01 = Math.max(0, alive[i] / P_LIFE); // 1->0

    // fade-out suave (desaparece por transparencia real)
    const a = life01 * life01 * life01; // más suave al final
    alphas[i] = a;

    positions[i*3+0] += velocity[i*3+0] * dt;
    positions[i*3+1] += velocity[i*3+1] * dt;
    positions[i*3+2] += velocity[i*3+2] * dt;

    velocity[i*3+0] *= (1 - dt*0.8);
    velocity[i*3+1] *= (1 - dt*0.4);
    velocity[i*3+2] *= (1 - dt*0.8);

    if (alive[i] <= 0){
      positions[i*3+1] = -999;
      alphas[i] = 0;
    }
  }

  if (any){
    pGeom.attributes.position.needsUpdate = true;
    pGeom.attributes.alpha.needsUpdate = true;
  }
}

// ==================== HÁPTICA + MIDI ====================
let rightHaptic = null;
let leftHaptic = null;

let rightTimes = [];
let leftTimes  = [];
let rightIdx = 0;
let leftIdx  = 0;

let lastVideoTimeForLoop = 0;
let lastPulseRightAt = -999;
let lastPulseLeftAt  = -999;

function updateHaptics(session){
  rightHaptic = null;
  leftHaptic = null;

  for (const src of session.inputSources){
    if (!src.gamepad) continue;
    const acts = src.gamepad.hapticActuators;
    if (!acts || acts.length === 0) continue;

    if (src.handedness === "right") rightHaptic = acts[0];
    if (src.handedness === "left")  leftHaptic  = acts[0];
  }

  log(rightHaptic ? "✅ Háptica derecha OK" : "⚠️ No háptica derecha");
  log(leftHaptic  ? "✅ Háptica izquierda OK" : "⚠️ No háptica izquierda");
}

function pulse(actuator){
  if (!actuator) return;
  try{ actuator.pulse(HAPTIC_INTENSITY, HAPTIC_DURATION_MS); }catch{}
}

function resyncIndex(times, midiTime){
  let lo = 0, hi = times.length;
  while (lo < hi){
    const mid = (lo + hi) >> 1;
    if (times[mid] <= midiTime) lo = mid + 1;
    else hi = mid;
  }
  return lo;
}

function tickHand(times, which, videoTime, midiTime){
  if (times.length === 0) return;

  if (which === "R"){
    while (rightIdx < times.length){
      const nt = times[rightIdx];
      const diff = nt - midiTime;

      if (diff <= HAPTIC_WINDOW){
        if (videoTime - lastPulseRightAt > MIN_PULSE_GAP){
          pulse(rightHaptic);
          lastPulseRightAt = videoTime;

          if (controllerRightObj){
            controllerRightObj.getWorldPosition(tmpV);
            spawnParticlesFrom(tmpV, 0.55);
          } else {
            screen.getWorldPosition(tmpFallback);
            spawnParticlesFrom(tmpFallback, 0.55);
          }
        }
        rightIdx++;
        continue;
      }
      break;
    }
  } else {
    while (leftIdx < times.length){
      const nt = times[leftIdx];
      const diff = nt - midiTime;

      if (diff <= HAPTIC_WINDOW){
        if (videoTime - lastPulseLeftAt > MIN_PULSE_GAP){
          pulse(leftHaptic);
          lastPulseLeftAt = videoTime;

          frameEnergy = Math.min(1.0, frameEnergy + 0.16);

          if (controllerLeftObj){
            controllerLeftObj.getWorldPosition(tmpV);
            spawnParticlesFrom(tmpV, 0.90);
          } else {
            screen.getWorldPosition(tmpFallback);
            spawnParticlesFrom(tmpFallback, 0.90);
          }
        }
        leftIdx++;
        continue;
      }
      break;
    }
  }
}

function tickHaptics(videoTime){
  if (rightTimes.length === 0 && leftTimes.length === 0) return;

  if (videoTime + 0.05 < lastVideoTimeForLoop){
    const mr = Math.max(0, videoTime - MIDI_OFFSET_RIGHT);
    const ml = Math.max(0, videoTime - MIDI_OFFSET_LEFT);
    rightIdx = resyncIndex(rightTimes, mr);
    leftIdx  = resyncIndex(leftTimes,  ml);
  }
  lastVideoTimeForLoop = videoTime;

  const midiTimeR = videoTime - MIDI_OFFSET_RIGHT;
  const midiTimeL = videoTime - MIDI_OFFSET_LEFT;

  if (midiTimeR >= 0) tickHand(rightTimes, "R", videoTime, midiTimeR);
  if (midiTimeL >= 0) tickHand(leftTimes,  "L", videoTime, midiTimeL);
}

// ==================== RENDER LOOP ====================
renderer.setAnimationLoop(()=>{
  if (video.readyState >= 2) videoTex.needsUpdate = true;

  const t = video.currentTime;

  while (nextCue < cues.length && t >= cues[nextCue].t){
    setupText(cues[nextCue].text);
    nextCue++;
  }

  const dt = Math.max(0, t - prevVideoT);
  prevVideoT = t;

  stepType(dt);
  tickHaptics(t);

  frameEnergy *= Math.exp(-dt * 3.2);
  framePhase += dt * (0.18 + frameEnergy * 0.25);
  drawGradient(framePhase, frameEnergy);
  frameMat.opacity = 0.78 + frameEnergy * 0.14;

  updateParticles(dt);

  renderer.render(scene, camera);
});

// ==================== BOTONES ====================
const btnStart = document.getElementById("start");
const btnAR = document.getElementById("enterAR");
const btnVR = document.getElementById("enterVR");

async function enter(mode){
  const s = await navigator.xr.requestSession(mode,{
    optionalFeatures:["local-floor","bounded-floor","hand-tracking"]
  });
  xrSession = s;
  renderer.xr.setSession(s);

  mapGrips(s);
  updateHaptics(s);

  s.addEventListener("inputsourceschange", () => {
    mapGrips(s);
    updateHaptics(s);
  });

  overlay.style.display = "none";
}

btnStart.onclick = async () => {
  try {
    loadPristinaFontNonBlocking();
    drawGradient(0, 0);

    await video.play();
    log("▶ Vídeo iniciado (con sonido)");

    try{
      log("⏳ Cargando MIDI derecha...");
      rightTimes = await loadMidiTimes(MIDI_RIGHT_URL);
      log("✅ MIDI derecha OK (" + rightTimes.length + " notas)");

      log("⏳ Cargando MIDI izquierda...");
      leftTimes = await loadMidiTimes(MIDI_LEFT_URL);
      log("✅ MIDI izquierda OK (" + leftTimes.length + " notas)");

      const mr = Math.max(0, video.currentTime - MIDI_OFFSET_RIGHT);
      const ml = Math.max(0, video.currentTime - MIDI_OFFSET_LEFT);
      rightIdx = resyncIndex(rightTimes, mr);
      leftIdx  = resyncIndex(leftTimes,  ml);

      log("🟣 Listo. Offsets: R=" + MIDI_OFFSET_RIGHT + "s, L=" + MIDI_OFFSET_LEFT + "s");
    }catch(e){
      log("⚠️ MIDI/háptica no disponibles: " + (e?.message || e));
    }

    btnAR.disabled = false;
    btnVR.disabled = false;

  } catch (e) {
    log("❌ No se pudo iniciar: " + (e?.message || e));
  }
};

btnAR.onclick = async () => {
  try{
    const ok = await navigator.xr.isSessionSupported("immersive-ar");
    if (!ok) throw new Error("immersive-ar no soportado");
    await enter("immersive-ar");
  }catch(e){
    log("❌ AR: " + (e?.message || e));
  }
};

btnVR.onclick = async () => {
  try{ await enter("immersive-vr"); }
  catch(e){ log("❌ VR: " + (e?.message || e)); }
};

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

log("✅ App cargada. Pulsa “Iniciar vídeo”.");
</script>
</body>
